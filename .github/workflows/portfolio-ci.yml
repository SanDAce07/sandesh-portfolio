name: Portfolio CI

on:
  push:
    paths:
      - "artifacts/portfolio/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - ".github/workflows/portfolio-ci.yml"
  pull_request:
    paths:
      - "artifacts/portfolio/**"
      - "lib/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig*.json"
      - ".github/workflows/portfolio-ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck:portfolio
      - run: pnpm run build:portfolio
